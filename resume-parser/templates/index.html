<!DOCTYPE html>
<html>
<head>
<title>ATS Analyzer AI</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
}

.container{
max-width:900px;
margin:50px auto;
padding:35px;
background:#111827;
border-radius:18px;
box-shadow:0 0 25px rgba(0,0,0,.45);
text-align:center;
}

h1{
font-size:42px;
margin-bottom:10px;
color:#38bdf8;
}

p{
color:#cbd5e1;
font-size:18px;
margin-bottom:30px;
}

.upload-box{
background:#1f2937;
padding:30px;
border-radius:16px;
margin-top:20px;
}

input[type="file"]{
padding:12px;
background:white;
border-radius:10px;
width:80%;
max-width:420px;
}

#fileStatus{
margin-top:12px;
font-size:16px;
font-weight:bold;
color:#22c55e;
}

button{
margin-top:18px;
padding:12px 24px;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
background:#22c55e;
color:white;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.actions{
margin-top:30px;
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

.btn{
text-decoration:none;
padding:12px 18px;
border-radius:10px;
font-weight:bold;
}

.history{
background:#38bdf8;
color:#00111a;
}

.logout{
background:#ef4444;
color:white;
}

.footer{
margin-top:25px;
font-size:14px;
color:#94a3b8;
}

.jd-box{
margin-top:20px;
margin-bottom:20px;
text-align:left;
}

.jd-box label{
display:block;
color:#38bdf8;
font-size:22px;
margin-bottom:10px;
font-weight:600;
}

.jd-box textarea{
width:100%;
height:180px;
padding:18px;
border:none;
outline:none;
border-radius:18px;
resize:none;
font-size:18px;
background:#1e293b;
color:white;
box-sizing:border-box;
}

</style>
</head>

<body>

<div class="container">

<h1>ATS Analyzer AI</h1>
<p>Upload your resume and get instant ATS score, skills analysis & PDF report.</p>

<div class="upload-box">

    <!-- DISPLAY ERROR MESSAGE -->
    {% if error %}
    <p style="color:#ef4444; font-weight:bold; margin-bottom:10px; text-align:center;">
    {{ error }}
    </p>
    {% endif %}

<form action="/upload" method="POST" enctype="multipart/form-data">

<input type="file" id="resumeFile" name="resume" required>

<p id="fileStatus">No file selected</p>

<br>

<div class="jd-box">
<label>📄 Enter Job Description</label>

<textarea name="jd" placeholder="Add Job Description here..."></textarea>
</div>

<button type="submit">📄 Upload Resume</button>

</form>

</div>

<div class="actions">

<a class="btn history" href="/history">📜 View History</a>

<a class="btn logout" href="/logout">🚪 Logout</a>

<a href="/change_password">🔐 Change Password</a>

</div>

<div class="footer">
Smart Resume Analyzer Dashboard
</div>

</div>

<script>

const fileInput = document.getElementById("resumeFile");
const submitBtn = document.querySelector("button");

submitBtn.disabled = true;

fileInput.addEventListener("change", function () {
    const file = this.files[0];

    if(file){
        document.getElementById("fileStatus").innerHTML = "✅ File Selected: " + file.name;
        submitBtn.disabled = false;
    } else {
        document.getElementById("fileStatus").innerHTML = "No file selected";
        submitBtn.disabled = true;
    }
});

let idleTime = 0;

setInterval(timerIncrement, 60000);

function timerIncrement() {
idleTime++;

if (idleTime >= 10) {
alert("Session expired due to inactivity.");
window.location.href = "/logout";
}
}

document.onmousemove = resetTimer;
document.onkeypress = resetTimer;
document.onclick = resetTimer;
document.onscroll = resetTimer;

function resetTimer() {
idleTime = 0;
}
const form = document.querySelector("form");

form.addEventListener("submit", function(e){
    const jd = document.querySelector("textarea[name='jd']").value.trim();

    if(jd === ""){
        alert("Please enter Job Description");
        e.preventDefault();
    }
});
</script>

</body>
</html>
