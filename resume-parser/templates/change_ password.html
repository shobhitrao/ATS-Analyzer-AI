<!DOCTYPE html>
<html>
<head>
<title>Change Password</title>

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.box{
    width:420px;
    background:#111827;
    padding:35px;
    border-radius:18px;
    box-shadow:0 0 25px rgba(0,0,0,0.5);
    text-align:center;
}

h1{
    color:#38bdf8;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    outline:none;
    font-size:16px;
    background:#1f2937;
    color:white;
}

input::placeholder{
    color:#9ca3af;
}

button{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#16a34a;
}

a{
    display:inline-block;
    margin-top:20px;
    color:#38bdf8;
    text-decoration:none;
    font-size:16px;
}

a:hover{
    text-decoration:underline;
}
</style>

</head>
<body>

<div class="box">

<h1>🔐 Change Password</h1>

<form method="POST">

<input type="password" name="old_password" placeholder="Old Password" required>

<input type="password" name="new_password" placeholder="New Password" required>

<button type="submit">Update Password</button>

</form>

<a href="/">⬅ Back to Dashboard</a>

</div>

</body>
</html>
