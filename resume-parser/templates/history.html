<!DOCTYPE html>
<html>
<head>
<title>History | ATS Analyzer AI</title>

<style>
body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
}

.container{
max-width:680px;
margin:18px auto;
padding:18px;
background:#111827;
border-radius:16px;
box-shadow:0 0 18px rgba(0,0,0,.45);
}

h1{
text-align:center;
color:#38bdf8;
margin-bottom:18px;
font-size:26px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:16px;
gap:10px;
}

.btn{
padding:7px 12px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
font-size:14px;
}

.home{background:#38bdf8;color:#00111a;}
.logout{background:#ef4444;color:white;}

.report{
background:#1f2937;
padding:10px;
border-radius:10px;
margin-bottom:10px;
border-left:4px solid #22c55e;
}

.label{
color:#94a3b8;
font-size:11px;
margin-bottom:5px;
}

.value{
font-size:13px;
line-height:1.3;
}

.score{
font-size:15px;
font-weight:bold;
color:#22c55e;
margin-top:6px;
}

.delete{
display:inline-block;
margin-top:8px;
padding:6px 10px;
background:#ef4444;
color:white;
text-decoration:none;
border-radius:8px;
font-size:12px;
font-weight:bold;
}

.empty{
text-align:center;
padding:20px;
background:#1f2937;
border-radius:10px;
color:#cbd5e1;
font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h1>Saved Reports 🔥</h1>

<div class="topbar">
<a class="btn home" href="/">🏠 Home</a>
<a class="btn logout" href="/logout">🚪 Logout</a>
</div>

{% if reports %}

{% for report in reports %}
<div class="report">

<div class="label">Report #{{ loop.index }}</div>

<div class="value">
<b>Skills:</b> {{ report.skills }}
</div>

<div class="score">
ATS Score: {{ report.score }}%
</div>

<a class="delete" href="/delete_report/{{ report.id }}">
🗑 Delete
</a>

</div>
{% endfor %}

{% else %}

<div class="empty">
No Reports Yet
</div>

{% endif %}

</div>

</body>
</html>
