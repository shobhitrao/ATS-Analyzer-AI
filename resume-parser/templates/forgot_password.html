<!DOCTYPE html>
<html>
<head>
<title>Forgot Password</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e293b);
}

.box{
width:420px;
background:#111827;
padding:40px;
border-radius:20px;
box-shadow:0 0 30px rgba(0,0,0,.45);
animation:fade 0.8s ease;
}

h1{
text-align:center;
color:#38bdf8;
margin-bottom:30px;
font-size:42px;
}

input{
width:100%;
padding:14px;
margin-bottom:18px;
border:none;
outline:none;
border-radius:10px;
background:#1f2937;
color:white;
font-size:17px;
}

input::placeholder{
color:#94a3b8;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#16a34a;
transform:scale(1.02);
}

a{
display:block;
text-align:center;
margin-top:20px;
color:#38bdf8;
text-decoration:none;
font-size:18px;
}

a:hover{
text-decoration:underline;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="box">

<h1>🔐 Forgot Password</h1>

<form method="POST">

<input type="text" name="username" placeholder="Enter Username" required>

<input type="email" name="email" placeholder="Enter Email Address" required>

<button type="submit">Send OTP</button>

</form>

<a href="/login">⬅ Back to Login</a>

</div>

</body>
</html>
